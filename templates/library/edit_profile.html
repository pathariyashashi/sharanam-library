<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f7fc;
            padding:40px;
        }

        .edit-box{
            width:500px;
            background:white;
            margin:auto;
            padding:30px;
            border-radius:20px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        .edit-box h2{
            text-align:center;
            margin-bottom:25px;
            color:#1e3c72;
        }

        .input-box{
            margin-bottom:18px;
        }

        .input-box label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        .input-box input,
        .input-box textarea{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:10px;
        }

        .save-btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#1e3c72;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

    </style>

</head>
<body>

<div class="edit-box">

    <h2>✏️ Edit Profile</h2>

    <form method="POST">

        {% csrf_token %}

        <div class="input-box">

            <label>Full Name</label>

            <input type="text"
                   name="fullname"
                   value="{{ student.fullname }}">

        </div>

        <div class="input-box">

            <label>Email</label>

            <input type="email"
                   name="email"
                   value="{{ student.email }}">

        </div>

        <div class="input-box">

            <label>Mobile</label>

            <input type="text"
                   name="mobile"
                   value="{{ student.mobile }}">

        </div>

        <div class="input-box">

            <label>Current Address</label>

            <textarea name="current_address">{{ student.current_address }}</textarea>

        </div>

        <div class="input-box">

            <label>Permanent Address</label>

            <textarea name="permanent_address">{{ student.permanent_address }}</textarea>

        </div>

        <button type="submit" class="save-btn">
            Save Changes
        </button>

    </form>

</div>

</body>
</html>
