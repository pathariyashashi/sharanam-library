{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Library Gallery</title>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background:#f4f7fb;

            overflow-x:hidden;

        }

        /* NAVBAR */

        .navbar{

            width:100%;

            background:linear-gradient(to right,#007bff,#00c6ff);

            padding:18px 40px;

            display:flex;

            justify-content:space-between;

            align-items:center;

            position:sticky;

            top:0;

            z-index:1000;

        }

        .logo-section{

            display:flex;

            align-items:center;

            gap:12px;

        }

        .logo-section img{

            width:65px;

            height:65px;

            border-radius:50%;

            background:white;

            padding:3px;

        }

        .logo-text h2{

            color:#ffcc99;

            font-size:30px;

            margin:0;

        }

        .logo-text p{

            color:white;

            font-size:18px;

            margin:0;

        }

        .nav-links{

            display:flex;

            gap:30px;

        }

        .nav-links a{

            color:white;

            text-decoration:none;

            font-size:19px;

            font-weight:600;

            transition:0.3s;

        }

        .nav-links a:hover{

            color:yellow;

        }

        /* GALLERY */

        .gallery-section{

            padding:50px;

            text-align:center;

        }

        .gallery-title{

            font-size:55px;

            color:#1d3557;

            margin-bottom:45px;

            font-weight:bold;

        }

        .gallery-container{

            display:grid;

            grid-template-columns:repeat(auto-fit,minmax(320px,1fr));

            gap:35px;

        }

        .gallery-card{

            background:white;

            border-radius:18px;

            overflow:hidden;

            box-shadow:0 5px 15px rgba(0,0,0,0.2);

            transition:0.3s;

        }

        .gallery-card:hover{

            transform:translateY(-10px);

        }

        .gallery-card img{

            width:100%;

            height:250px;

            object-fit:cover;

        }

        .gallery-card h3{

            padding:20px;

            font-size:28px;

            color:#1d3557;

        }

        @media(max-width:768px){

            .navbar{

                flex-direction:column;

                gap:20px;

            }

            .nav-links{

                flex-wrap:wrap;

                justify-content:center;

            }

            .gallery-title{

                font-size:40px;

            }

        }

    </style>

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="logo-section">

            <img src="{% static 'images/logo.jpg' %}">

            <div class="logo-text">

                <h2>शारणम्</h2>

                <p>Sitting Library</p>

            </div>

        </div>

        <div class="nav-links">

            <a href="/">Home</a>

            <a href="/about/">About</a>

            <a href="/address/">Address</a>

            <a href="/gallery/">Gallery</a>

            <a href="/updates/">Updates</a>

            <a href="/rules/">Rules</a>

        </div>

    </nav>

    <!-- GALLERY -->

    <section class="gallery-section">

        <h1 class="gallery-title">
            📷 Library Gallery
        </h1>

        <div class="gallery-container">

            <div class="gallery-card">

                <img src="{% static 'images/lib1.jpg' %}">

                <h3>Silent Study Zone</h3>

            </div>

            <div class="gallery-card">

                <img src="{% static 'images/lib2.jpg' %}">

                <h3>Reading Area</h3>

            </div>

            <div class="gallery-card">

                <img src="{% static 'images/lib3.jpg' %}">

                <h3>Comfortable Seating</h3>

            </div>

            <div class="gallery-card">

                <img src="{% static 'images/lib4.jpg' %}">

                <h3>Night Study</h3>

            </div>

            <div class="gallery-card">

                <img src="{% static 'images/lib5.jpg' %}">

                <h3>Peaceful Environment</h3>

            </div>

            <div class="gallery-card">

                <img src="{% static 'images/lib6.jpg' %}">

                <h3>Modern Facilities</h3>

            </div>

        </div>

    </section>

</body>

</html>
