<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#1e3c72,#2a5298);
        }

        .login-box{
            width:400px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        .login-box h2{
            text-align:center;
            margin-bottom:25px;
            color:#1e3c72;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        .input-box input{
            width:100%;
            padding:14px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:15px;
        }

        .login-btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#1e3c72;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        .login-btn:hover{
            background:#2a5298;
        }

        .register-link{
            text-align:center;
            margin-top:20px;
        }

        .register-link a{
            text-decoration:none;
            color:#1e3c72;
            font-weight:bold;
        }

    </style>

</head>
<body>

<div class="login-box">

    <h2>🔐 Student Login</h2>

    {% if error %}

    <p style="color:red; text-align:center; margin-bottom:15px;">
        {{ error }}
    </p>

    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="input-box">

            <label>Username</label>

            <input type="text"
                   name="username"
                   placeholder="Enter Username"
                   required>

        </div>

        <div class="input-box">

            <label>Password</label>

            <input type="password"
                   name="password"
                   placeholder="Enter Password"
                   required>

        </div>

        <button type="submit" class="login-btn">
            Login
        </button>

    </form>

    <div class="register-link">

        Don't have an account?

        <a href="/register/">
            Register
        </a>

    </div>

</div>

</body>
</html>
