{% load static %}

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow-x:hidden;
}

/* NAVBAR */

.navbar{
    width:100%;
    background:#031b4e;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    position:sticky;
    top:0;
    z-index:999;
}

/* LOGO */

.logo-section{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo-section img{
    width:55px;
    height:55px;
    border-radius:50%;
    background:white;
    padding:3px;
}

.logo-text h2{
    color:#ff9900;
    font-size:28px;
    margin:0;
    line-height:1;
}

.logo-text p{
    color:white;
    font-size:16px;
    margin:0;
    font-weight:bold;
}

/* LINKS */

.nav-links{
    display:flex;
    align-items:center;
    gap:22px;
    flex-wrap:wrap;
}

.nav-links a{
    color:white;
    text-decoration:none;
    font-size:17px;
    font-weight:bold;
    transition:0.3s;
}

.nav-links a:hover{
    color:#ffd166;
}

/* MOBILE */

@media(max-width:768px){

    .navbar{
        flex-direction:column;
        align-items:flex-start;
        padding:15px;
    }

    .logo-section{
        width:100%;
    }

    .logo-section img{
        width:48px;
        height:48px;
    }

    .logo-text h2{
        font-size:24px;
    }

    .logo-text p{
        font-size:14px;
    }

    .nav-links{
        width:100%;
        margin-top:15px;
        display:grid;
        grid-template-columns:repeat(3,1fr);
        gap:12px;
        text-align:center;
    }

    .nav-links a{
        background:rgba(255,255,255,0.08);
        padding:10px 5px;
        border-radius:10px;
        font-size:15px;
    }

}

</style>

<nav class="navbar">

    <div class="logo-section">

        <img src="{% static 'images/logo.jpg' %}" alt="logo">

        <div class="logo-text">

            <h2>शारणम्</h2>

            <p>Sitting Library</p>

        </div>

    </div>

    <div class="nav-links">

        <a href="/">Home</a>

        <a href="/about/">About</a>

        <a href="/address/">Address</a>

        <a href="/gallery/">Gallery</a>

        <a href="/updates/">Updates</a>

        <a href="/rules/">Rules</a>

    </div>

</nav>
