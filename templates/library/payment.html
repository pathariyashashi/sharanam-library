{% load static %}
<!DOCTYPE html>
<html>

<head>

    <title>Payment</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f7fb;
        }

        .box{

            width:450px;

            margin:auto;

            margin-top:100px;

            background:white;

            padding:40px;

            border-radius:20px;

            text-align:center;

            box-shadow:0 0 20px rgba(0,0,0,0.2);
        }

        h1{
            color:#007bff;
            margin-bottom:20px;
        }

        .pay-btn{

            background:linear-gradient(to right,#28a745,#20c997);

            color:white;

            padding:15px 30px;

            text-decoration:none;

            border-radius:10px;

            font-size:20px;

            display:inline-block;

            margin-top:25px;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>💳 Payment Page</h1>

    <h2>Seat: {{ seat }}</h2>

    <h2>Slot: {{ slot }}</h2>

    <h2>Amount: ₹1500</h2>
    <img src="{% static 'images/myqr.png' %}"

style="
width:250px;
margin-top:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
">

<h3 style="margin-top:15px;">

UPI Payment

</h3>

    <a href="/payment-success/?seat={{ seat }}"

       class="pay-btn">

     I Have Paid

    </a>

</div>

</body>

</html>
