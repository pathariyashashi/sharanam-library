{% load static %}

<!DOCTYPE html>
<html>

<head>

    <title>Seat Booking</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:Arial;

            background:#f4f7fb;

            min-height:100vh;
        }

        /* NAVBAR */

        .navbar{

            width:100%;

            background:linear-gradient(to right,#007bff,#00c6ff);

            padding:18px 40px;

            display:flex;

            justify-content:space-between;

            align-items:center;

        }

        .logo-section{

            display:flex;

            align-items:center;

            gap:12px;

        }

        .logo-section img{

            width:65px;

            height:65px;

            border-radius:50%;

            background:white;

            padding:3px;

        }

        .logo-text h2{

            color:#ffcc99;

            font-size:30px;

            margin:0;

        }

        .logo-text p{

            color:white;

            font-size:18px;

            margin:0;

        }

        .nav-links{

            display:flex;

            gap:30px;

        }

        .nav-links a{

            color:white;

            text-decoration:none;

            font-size:18px;

            font-weight:bold;

        }

        /* BOOKING BOX */

        .main-box{

            display:flex;

            justify-content:center;

            align-items:center;

            padding:70px 20px;
        }

        .box{

            width:450px;

            background:white;

            padding:40px;

            border-radius:20px;

            box-shadow:0 0 20px rgba(0,0,0,0.2);

            text-align:center;
        }

        .box h1{

            color:#2196f3;

            margin-bottom:30px;

            font-size:42px;
        }

        select{

            width:100%;

            padding:15px;

            margin-bottom:20px;

            border-radius:10px;

            border:1px solid #ccc;

            font-size:18px;
        }

        button{

            width:100%;

            background:linear-gradient(to right,#2196f3,#00bcd4);

            color:white;

            padding:16px;

            border:none;

            border-radius:12px;

            font-size:22px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            transform:scale(1.03);
        }

    </style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

    <div class="logo-section">

        <img src="{% static 'images/logo.jpg' %}">

        <div class="logo-text">

            <h2>शारणम्</h2>

            <p>Sitting Library</p>

        </div>

    </div>

    <div class="nav-links">

        <a href="/">Home</a>

        <a href="/about/">About</a>

        <a href="/address/">Address</a>

        <a href="/gallery/">Gallery</a>

        <a href="/updates/">Updates</a>

        <a href="/rules/">Rules</a>

    </div>

</nav>

<!-- BOOKING FORM -->

<div class="main-box">

    <div class="box">

        <h1>💺 Seat Booking</h1>

        <form method="POST">

            {% csrf_token %}

            <!-- Seat Dropdown -->

           <select name="seat" required>

    <option value="">Select Seat</option>

    {% for seat in available_seats %}

    <option value="{{ seat }}">

        {{ seat }}

    </option>

    {% endfor %}

</select>

            <!-- Slot Dropdown -->

            <select name="slot" required>

                <option value="">Select Time Slot</option>

                <option value="Morning">Morning</option>

                <option value="Afternoon">Afternoon</option>

                <option value="Evening">Evening</option>

                <option value="Full Day">Full Day</option>

            </select>

            <!-- Submit Button -->

            <button type="submit">

                Book Seat

            </button>

        </form>

    </div>

</div>

</body>

</html>
