{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Updates</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f5f7fb;
            font-family:Arial;
        }

        .main-box{
            padding:50px 20px;
        }

        .title{
            text-align:center;
            font-size:45px;
            font-weight:bold;
            margin-bottom:40px;
            color:#0b1f4d;
        }

        .update-card{
            background:white;
            padding:25px;
            border-radius:18px;
            margin-bottom:25px;
            box-shadow:0 5px 15px rgba(0,0,0,0.08);
            border-left:6px solid #ff8800;
        }

        .new{
            background:red;
            color:white;
            padding:3px 10px;
            border-radius:10px;
            font-size:12px;
            margin-left:10px;
        }

        .msg{
            font-size:20px;
            color:#333;
        }

        .back-btn{
            background:#0b1f4d;
            color:white;
            padding:12px 25px;
            text-decoration:none;
            border-radius:10px;
        }

    </style>

</head>

<body>

    {% include 'library/navbar.html' %}

<div class="container main-box">

    <h1 class="title">

        🔔 Latest Updates

    </h1>

    {% for note in notifications %}

    <div class="update-card">

        <div class="msg">

            {{ note.message }}

            {% if forloop.first %}

            <span class="new">

                NEW

            </span>

            {% endif %}

        </div>

    </div>

    {% empty %}

    <h4>No Updates Available</h4>

    {% endfor %}

    <a href="/" class="back-btn">

        ← Back To Home

    </a>

</div>

</body>

</html>
